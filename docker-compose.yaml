version: '3.8'

services:
  medical-api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=your-secret-key-change-in-production
      - JWT_EXPIRATION=86400
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3