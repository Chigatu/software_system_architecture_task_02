openapi: 3.0.0
info:
  title: Medical Records Management System API
  description: REST API для управления медицинскими записями (Вариант 20)
  version: 2.0.0
  contact:
    name: Support
    email: support@medical-records.ru

servers:
  - url: http://localhost:8080/api
    description: Development server

tags:
  - name: Health
    description: Проверка работоспособности
  - name: Authentication
    description: Регистрация и аутентификация
  - name: Users
    description: Управление пользователями
  - name: Patients
    description: Управление пациентами
  - name: Medical Records
    description: Управление медицинскими записями

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        login:
          type: string
        email:
          type: string
        fullName:
          type: string

    CreateUserRequest:
      type: object
      required:
        - login
        - email
        - firstName
        - lastName
        - password
      properties:
        login:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        patronymic:
          type: string
        password:
          type: string

    LoginRequest:
      type: object
      required:
        - login
        - password
      properties:
        login:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'

    Patient:
      type: object
      properties:
        id:
          type: integer
        fullName:
          type: string
        phone:
          type: string
        address:
          type: string
        age:
          type: integer
        snils:
          type: string
        policyNumber:
          type: string

    CreatePatientRequest:
      type: object
      required:
        - firstName
        - lastName
        - phone
        - address
        - birthDate
        - snils
        - policyNumber
      properties:
        firstName:
          type: string
        lastName:
          type: string
        patronymic:
          type: string
        phone:
          type: string
        address:
          type: string
        birthDate:
          type: string
        snils:
          type: string
        policyNumber:
          type: string
        userId:
          type: integer

    MedicalRecord:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        patientId:
          type: integer
        doctorId:
          type: integer
        diagnosisCode:
          type: string
        diagnosisDescription:
          type: string
        complaints:
          type: string
        createdAt:
          type: string

    CreateMedicalRecordRequest:
      type: object
      required:
        - patientId
        - doctorId
        - diagnosisCode
        - diagnosisDescription
        - complaints
      properties:
        patientId:
          type: integer
        doctorId:
          type: integer
        diagnosisCode:
          type: string
        diagnosisDescription:
          type: string
        complaints:
          type: string

    Error:
      type: object
      properties:
        error:
          type: string

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  service:
                    type: string
                  version:
                    type: string

  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Bad request

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials

  /users/search:
    get:
      tags:
        - Users
      summary: Search users by name mask
      parameters:
        - name: mask
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'

  /patients:
    post:
      tags:
        - Patients
      summary: Create patient
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePatientRequest'
      responses:
        '201':
          description: Patient created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'
        '401':
          description: Unauthorized

  /patients/search:
    get:
      tags:
        - Patients
      summary: Search patients by name
      parameters:
        - name: fullName
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of patients
          content:
            application/json:
              schema:
                type: object
                properties:
                  patients:
                    type: array
                    items:
                      $ref: '#/components/schemas/Patient'

  /medical-records:
    post:
      tags:
        - Medical Records
      summary: Create medical record
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMedicalRecordRequest'
      responses:
        '201':
          description: Record created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicalRecord'
        '401':
          description: Unauthorized

  /medical-records/patient/{patientId}:
    get:
      tags:
        - Medical Records
      summary: Get patient records
      security:
        - bearerAuth: []
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of records
          content:
            application/json:
              schema:
                type: object
                properties:
                  records:
                    type: array
                    items:
                      $ref: '#/components/schemas/MedicalRecord'
        '401':
          description: Unauthorized

  /medical-records/{code}:
    get:
      tags:
        - Medical Records
      summary: Get record by code
      security:
        - bearerAuth: []
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Medical record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicalRecord'
        '401':
          description: Unauthorized
        '404':
          description: Record not found
